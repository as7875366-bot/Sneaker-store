<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card p-3 shadow-sm border-0 bg-light">
        <h4 class="fw-bold text-primary">{{ onEditModeon ? 'Update Product' : 'Add New Product' }}</h4>
        <hr>
        <div class="mb-2">
          <label class="small fw-bold">Name</label>
          <input type="text" [(ngModel)]="productForm.name" class="form-control" placeholder="Sneaker name...">
        </div>
        <div class="mb-2">
          <label class="small fw-bold">Price (₹)</label>
          <input type="number" [(ngModel)]="productForm.price" class="form-control">
        </div>
        <div class="mb-2">
          <label class="small fw-bold">Image URL</label>
          <input type="text" [(ngModel)]="productForm.img" class="form-control" placeholder="https://...">
        </div>
        <div class="mb-3">
          <label class="small fw-bold">Description</label>
          <textarea [(ngModel)]="productForm.des" class="form-control" rows="2"></textarea>
        </div>
        <button (click)="onSubmit()" class="btn btn-primary w-100 shadow-sm">
          {{ onEditModeon ? 'Save Changes' : 'Add to Inventory' }}
        </button>
        <button *ngIf="onEditModeon" (click)="resetForm()" class="btn btn-link w-100 text-muted mt-2">Cancel</button>
      </div>
    </div>

    <div class="col-md-8">
      <h4 class="fw-bold">Product Inventory</h4>
      <div class="table-responsive mt-3">
        <table class="table table-hover align-middle bg-white rounded shadow-sm">
          <thead class="table-dark">
            <tr>
              <th>Img</th>
              <th>Product Name</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of product">
              <td><img [src]="p.img" width="40" height="40" class="rounded object-fit-cover"></td>
              <td class="fw-bold">{{ p.name }}</td>
              <td>₹{{ p.price }}</td>
              <td>
                <button (click)="onEdit(p)" class="btn btn-sm btn-outline-info me-2">Edit</button>
                <button (click)="onDelete(p.id)" class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
