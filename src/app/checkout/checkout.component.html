<div class="container mt-5 mb-5">
  <h1 class="text-center mb-5 fw-bold text-uppercase tracking-wider">Checkout</h1>

  <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
    <div class="row g-5">
      
      <div class="col-lg-4">
        <h5 class="fw-bold mb-4 border-bottom pb-2 text-uppercase">Billing Address 
          <span class="text-danger small float-end" style="font-size: 10px;">* Required</span>
        </h5>
        
        <div class="row g-2">
          <div class="col-md-6 mb-3">
            <input type="text" name="firstName" class="form-control bg-light border-0 p-3" 
                   [class.is-invalid]="checkoutForm.get('firstName')?.touched && checkoutForm.get('firstName')?.invalid"
                   placeholder="First Name*" formControlName="firstName">
          </div>
          <div class="col-md-6 mb-3">
            <input type="text" name="lastName" class="form-control bg-light border-0 p-3" 
                   [class.is-invalid]="checkoutForm.get('lastName')?.touched && checkoutForm.get('lastName')?.invalid"
                   placeholder="Last Name*" formControlName="lastName">
          </div>
        </div>

        <div class="mb-3">
          <input type="email" name="email" class="form-control bg-light border-0 p-3" 
                 placeholder="Email Address*" formControlName="email">
          <div class="invalid-feedback" *ngIf="checkoutForm.get('email')?.touched && checkoutForm.get('email')?.invalid">
            Please enter a valid email.
          </div>
        </div>

        <div class="mb-3">
          <input type="text" name="phone" class="form-control bg-light border-0 p-3" 
                 placeholder="Telephone*" formControlName="phone">
        </div>

        <div class="mb-3">
          <select class="form-select bg-light border-0 p-3" name="country" formControlName="country">
            <option value="India">India</option>
            <option value="Australia">Australia</option>
          </select>
        </div>

        <div class="mb-3">
          <input type="text" name="address" class="form-control bg-light border-0 p-3" 
                 placeholder="Address*" formControlName="address">
        </div>

        <div class="mb-3">
          <input type="text" name="city" class="form-control bg-light border-0 p-3" 
                 placeholder="Town/Suburb*" formControlName="city">
        </div>

        <div class="row g-2">
          <div class="col-md-7 mb-3">
            <input type="text" name="state" class="form-control bg-light border-0 p-3" 
                   placeholder="State/Region*" formControlName="state">
          </div>
          <div class="col-md-5 mb-3">
            <input type="text" name="pincode" class="form-control bg-light border-0 p-3" 
                   placeholder="Pincode*" formControlName="pincode">
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <h5 class="fw-bold mb-4 border-bottom pb-2 text-uppercase">Shipping & Payment</h5>
        
        <div class="mb-4 border p-3 rounded bg-white shadow-sm">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="shipping" id="stdShip" checked>
            <label class="form-check-label" for="stdShip">
              Standard Shipping <b class="ms-2">₹50.00</b>
            </label>
          </div>
        </div>

        <div class="border p-3 rounded mb-3 bg-white shadow-sm">
          <div class="form-check mb-3">
            <input class="form-check-input" type="radio" formControlName="paymentMethod" value="card" id="payCard">
            <label class="form-check-label fw-bold" for="payCard">Credit Card (Stripe)</label>
          </div>

          <div [hidden]="checkoutForm.get('paymentMethod')?.value !== 'card'" 
               class="mt-3 mb-3 p-3 border rounded bg-light border-primary shadow-inner">
            <div id="stripe-card-element"></div>
          </div>

          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" formControlName="paymentMethod" value="paypal" id="payPaypal">
            <label class="form-check-label fw-bold" for="payPaypal">PayPal</label>
          </div>
        </div>
        
        <div *ngIf="checkoutForm.get('paymentMethod')?.value === 'paypal'" class="alert alert-info small py-2 d-flex align-items-center">
          <div class="spinner-border spinner-border-sm me-2"></div>
          Redirecting to PayPal securely...
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card border-0 p-4 shadow h-100 review-card" style="background: var(--card-bg); border-top: 5px solid #198754 !important;">
          <h5 class="fw-bold mb-4 text-center">REVIEW ORDER</h5>
          
          <div class="overflow-auto mb-3 px-1" style="max-height: 300px;">
            <div class="d-flex gap-3 mb-4 bg-white p-2 rounded shadow-sm align-items-center" *ngFor="let item of cart">
              <img [src]="item.img" width="60" class="rounded object-fit-contain bg-light border">
              <div class="small flex-grow-1">
                <p class="mb-0 fw-bold text-dark text-truncate" style="max-width: 150px;">{{ item.name }}</p>
                <p class="text-success mb-0 fw-bold">₹{{ item.price }}</p>
                <small class="text-muted">Qty: {{ item.quantity || 1 }}</small>
              </div>
            </div>
          </div>

          <div class="mt-auto pt-4 border-top">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Subtotal</span> 
              <span class="fw-bold">₹{{ subtotal }}</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Shipping & Tax</span> 
              <span class="fw-bold">₹{{ gst }}</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-4 mt-2 h4">
              <span class="fw-bold">Total</span>
              <span class="fw-bold text-success">₹{{ subtotal + gst }}</span>
            </div>

            <button type="submit" 
                    class="btn btn-success w-100 py-3 fw-bold fs-5 shadow-lg text-uppercase rounded-pill transition-btn" 
                    [disabled]="checkoutForm.invalid || inprocessing">
              <span *ngIf="inprocessing" class="spinner-border spinner-border-sm me-2"></span>
              {{ inprocessing ? 'Processing...' : 'Place Order' }}
            </button>
          </div>
        </div>
      </div>

    </div>
  </form>
</div>
